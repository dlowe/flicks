name: Publish

# Rebuilds the calendar and publishes it to the gh-pages branch, served at
# https://dlowe.github.io/flicks/.
#
# Manual-only by design. Hollywood Theatre sits behind a Cloudflare TLS
# challenge that blocks GitHub's datacenter IPs (403), so a CI-built page is
# missing Hollywood. The primary publish path is ./publish.sh from a machine on
# a residential IP, which gets the full slate; auto push/cron deploys are
# disabled so they can't overwrite a good local build with a Hollywood-less one.
on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build the page
        run: python -m flicks.main
      - name: Stage site
        run: |
          mkdir -p site
          cp index.html events.json site/
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
